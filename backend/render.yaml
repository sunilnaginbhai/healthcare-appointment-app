services:
  - type: web
    name: healthcare-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        scope: build
        value: postgresql://user:password@localhost:5432/healthcare_db
      - key: JWT_SECRET
        scope: build
        value: your_super_secret_jwt_key_change_this
      - key: NODE_ENV
        scope: build
        value: production
      - key: CLIENT_URL
        scope: build
        value: https://your-frontend-url.netlify.app
